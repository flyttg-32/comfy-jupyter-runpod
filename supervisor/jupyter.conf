[program:jupyter]
command=/bin/bash -lc 'mkdir -p /workspace/logs && /venv/main/bin/python -m jupyterlab --ip=0.0.0.0 --port=8889 --no-browser --allow-root --ServerApp.token="" --ServerApp.password="" --ServerApp.allow_origin="*" --ServerApp.disable_check_xsrf=True'
autostart=true
autorestart=true
startsecs=5
stdout_logfile=/tmp/jupyter.log
stderr_logfile=/tmp/jupyter.err.log
stdout_logfile_maxbytes=50MB
stderr_logfile_maxbytes=50MB
