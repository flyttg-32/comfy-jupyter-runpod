name: Mirror Base Image

on:
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull original image
        run: docker pull krist1k/comfy:v0.14.2-cuda-12.9-py312

      - name: Tag image as mine
        run: docker tag krist1k/comfy:v0.14.2-cuda-12.9-py312 flyttg/comfy-base:v0.14.2-cuda-12.9-py312

      - name: Push my base image
        run: docker push flyttg/comfy-base:v0.14.2-cuda-12.9-py312
